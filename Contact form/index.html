<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="form-header">
        <div class="Container Container--flex">

        <img class="form-header__image-perfil" 
        src="/images/Vector.svg" 
        alt="imagem ilustrativa de um usuário">

        <h1 class="form-header__titulo">Contact Form</h1>
        <p class="form-header__text">Insira os dados de contato e clique em cadastrar!</p>
        </div>
    </header>

<main>
    <div class="Container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">

                <div class="form-contact__col-a">
                <label class="form-contact__label" for="nome">Nome</label>
                </div> 
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="nome" name="nome" placeholder="Nome">
                    <input class="form-contact__input form-contact__input--metade" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                </div>

            </div>
            
            <div class="form-contact__linha">

                <div class="form-contact__inteiro">
                <label class="form-contact__label" for="nome">Email</label>
                </div> 
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__inteiro" type="text" id="Email" name="email" placeholder="ex:fulano@email.com">
                
                </div>

            </div>
            
        </form>
    </div>
</main>

    <footer>
        Todos os direitos reservados - 2026
    </footer>

</body>
</html>
